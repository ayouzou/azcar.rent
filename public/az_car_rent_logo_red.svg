<svg viewBox="0 0 640 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#242832"/>
      <stop offset="100%" stop-color="#14161C"/>
    </linearGradient>
  </defs>

  <!-- Badge -->
  <rect x="16" y="16" width="168" height="168" rx="28" fill="url(#badgeGrad)"/>

  <!-- Speed streak motif behind monogram -->
  <g stroke="#E0342A" stroke-width="6" stroke-linecap="round" opacity="0.55">
    <line x1="34" y1="150" x2="70" y2="150"/>
    <line x1="34" y1="132" x2="58" y2="132"/>
  </g>

  <!-- Monogram A Z -->
  <text x="100" y="132" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="98" fill="#F7F6F2" text-anchor="middle" letter-spacing="-6">AZ</text>

  <!-- Diagonal road stroke cutting through the Z, trailing into a wheel -->
  <path d="M 62 158 L 150 60" stroke="#E0342A" stroke-width="7" stroke-linecap="round"/>
  <circle cx="150" cy="60" r="9" fill="#E0342A"/>
  <circle cx="150" cy="60" r="3.5" fill="#14161C"/>

  <!-- Wordmark -->
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="216" y="102" font-size="54" font-weight="800" fill="#14161C" letter-spacing="1">CAR RENT</text>
    <text x="218" y="130" font-size="20" font-weight="600" fill="#6B7280" letter-spacing="6">A TO Z, EVERY RIDE</text>
  </g>

  <!-- Underline accent -->
  <rect x="218" y="142" width="230" height="6" rx="3" fill="#E0342A"/>
</svg>
